services:
  backend:
    build: .
    container_name: afia-backend
    ports:
      - 8000:8000
    env_file:
      - .env
    networks:
      - backend-network
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: afia-db
    ports:
      - 5435:5432
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend-network

volumes:
  db-data:

networks:
  backend-network:
    driver: bridge